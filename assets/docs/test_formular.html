<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formular de Înregistrare – Service Auto Rapid</title>
  <style>
    :root {
      --form-bg: #f0f4f8;
      --accent: #1a73e8;
      --error: #d32f2f;
      --success: #388e3c;
      --border: #b0bec5;
      --text: #263238;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--form-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
      transition: background 0.4s;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo h1 {
      font-size: 1.5rem;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .logo span {
      font-size: 0.85rem;
      color: #90a4ae;
    }

    .form-group {
      margin-bottom: 1.4rem;
      position: relative;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="password"],
    input[type="date"],
    input[type="color"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      transition: border-color 0.25s, box-shadow 0.25s;
      outline: none;
      background: #fafafa;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
      background: #fff;
    }

    input:not(:placeholder-shown):invalid {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(211,47,47,0.12);
    }

    input:not(:placeholder-shown):valid {
      border-color: var(--success);
      box-shadow: 0 0 0 3px rgba(56,142,60,0.12);
    }

    /* Error tooltip */
    .error-msg {
      display: none;
      font-size: 0.75rem;
      color: var(--error);
      margin-top: 0.3rem;
    }

    input:not(:placeholder-shown):invalid + .error-msg {
      display: block;
    }

    /* Color picker special */
    .color-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    input[type="color"] {
      width: 54px;
      height: 40px;
      padding: 2px 4px;
      cursor: pointer;
      border-radius: 6px;
    }

    .color-label {
      font-size: 0.85rem;
      color: #607d8b;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    button[type="submit"]:hover {
      background: #1558c0;
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }

    /* Loading animation on hover */
    button[type="submit"]::after {
      content: '';
      position: absolute;
      left: -75%;
      top: 0; bottom: 0;
      width: 50%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      animation: shimmer 1.2s infinite;
    }

    @keyframes shimmer {
      100% { left: 125%; }
    }

    hr { border: none; border-top: 1px solid #eceff1; margin: 1rem 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🔧 Service Auto "Rapid"</h1>
      <span>Formular de Înregistrare Client</span>
    </div>

    <form novalidate id="regForm">

      <!-- Username -->
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="ex: ion_popescu"
          minlength="5"
          pattern="[a-z0-9]+"
          autocomplete="username"
          required
        />
        <span class="error-msg">Minim 5 caractere, doar litere mici și cifre.</span>
      </div>

      <!-- Parolă -->
      <div class="form-group">
        <label for="parola">Parolă</label>
        <input
          type="password"
          id="parola"
          name="parola"
          placeholder="••••••••"
          pattern="(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}"
          autocomplete="new-password"
          required
        />
        <span class="error-msg">Min. 8 caractere, o literă mare, un număr și un simbol (!@#$%).</span>
      </div>

      <hr />

      <!-- Data Rezervării -->
      <div class="form-group">
        <label for="data_rez">Data Rezervării</label>
        <input
          type="date"
          id="data_rez"
          name="data_rezervare"
          min="2026-05-01"
          max="2026-05-31"
          autocomplete="off"
          required
        />
        <span class="error-msg">Alegeți o dată în luna Mai 2026 (01 – 31 mai).</span>
      </div>

      <!-- Culoare Temă -->
      <div class="form-group">
        <label>Culoare Temă Formular</label>
        <div class="color-row">
          <input
            type="color"
            id="culoare_tema"
            name="culoare_tema"
            value="#f0f4f8"
          />
          <span class="color-label">Alegeți o culoare de fundal</span>
        </div>
      </div>

      <button type="submit">Înregistrează-mă</button>
    </form>
  </div>

  <script>
    // Color picker → schimbă CSS variable pe body
    document.getElementById('culoare_tema').addEventListener('input', function() {
      document.body.style.setProperty('--form-bg', this.value);
      document.body.style.background = this.value;
    });

    // Submit simplu
    document.getElementById('regForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const inputs = this.querySelectorAll('input[required]');
      let valid = true;
      inputs.forEach(inp => { if (!inp.validity.valid) valid = false; });
      if (valid) alert('✅ Formular valid! Date trimise cu succes.');
      else alert('⚠️ Verificați câmpurile marcate cu roșu.');
    });
  </script>
</body>
</html>
